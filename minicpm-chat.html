<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Local AI · MiniCPM5-1B</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f7f6f3;
      --surface: #ffffff;
      --border: rgba(0,0,0,0.08);
      --border-strong: rgba(0,0,0,0.14);
      --text-primary: #1a1a18;
      --text-secondary: #6b6b65;
      --text-muted: #a0a09a;
      --accent: #1D9E75;
      --accent-light: #e1f5ee;
      --user-bg: #1a1a18;
      --user-text: #f7f6f3;
      --radius: 16px;
      --radius-sm: 8px;
      --font: 'DM Sans', sans-serif;
      --mono: 'DM Mono', monospace;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #111110;
        --surface: #1a1a18;
        --border: rgba(255,255,255,0.08);
        --border-strong: rgba(255,255,255,0.14);
        --text-primary: #f0efe9;
        --text-secondary: #888880;
        --text-muted: #555550;
        --accent: #1D9E75;
        --accent-light: #0a2e21;
        --user-bg: #f0efe9;
        --user-text: #111110;
      }
    }

    html, body { height: 100%; }

    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--text-primary);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 24px 16px;
    }

    #app {
      width: 100%;
      max-width: 700px;
      height: min(80vh, 700px);
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* Header */
    #header {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 16px 20px;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .status-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--accent);
      flex-shrink: 0;
    }

    .status-dot.offline { background: var(--text-muted); }

    #header-title {
      font-size: 14px;
      font-weight: 500;
      color: var(--text-primary);
      letter-spacing: -0.01em;
    }

    #header-right {
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .model-badge {
      font-family: var(--mono);
      font-size: 11px;
      color: var(--text-secondary);
      background: var(--bg);
      border: 1px solid var(--border);
      padding: 3px 10px;
      border-radius: 20px;
    }

    .local-badge {
      font-size: 11px;
      font-weight: 500;
      color: var(--accent);
      background: var(--accent-light);
      padding: 3px 10px;
      border-radius: 20px;
    }

    /* Messages */
    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 28px 20px;
      display: flex;
      flex-direction: column;
      gap: 24px;
      scroll-behavior: smooth;
    }

    #messages::-webkit-scrollbar { width: 4px; }
    #messages::-webkit-scrollbar-track { background: transparent; }
    #messages::-webkit-scrollbar-thumb { background: var(--border-strong); border-radius: 2px; }

    .msg { display: flex; gap: 12px; align-items: flex-start; animation: fadeUp 0.2s ease; }
    .msg.user { flex-direction: row-reverse; margin-left: auto; max-width: 85%; }
    .msg.ai { max-width: 100%; }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(6px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .avatar {
      width: 30px;
      height: 30px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      font-weight: 500;
      flex-shrink: 0;
      letter-spacing: 0.02em;
    }

    .avatar.ai {
      background: var(--accent-light);
      color: var(--accent);
      border: 1px solid var(--border);
      font-family: var(--mono);
    }

    .avatar.user {
      background: var(--user-bg);
      color: var(--user-text);
    }

    .bubble {
      padding: 11px 15px;
      border-radius: var(--radius);
      font-size: 14px;
      line-height: 1.65;
      color: var(--text-primary);
      white-space: pre-wrap;
      word-break: break-word;
    }

    .msg.ai .bubble {
      background: var(--bg);
      border: 1px solid var(--border);
      border-top-left-radius: 4px;
    }

    .msg.user .bubble {
      background: var(--user-bg);
      color: var(--user-text);
      border-top-right-radius: 4px;
    }

    /* Typing indicator */
    .typing-dots {
      display: flex;
      gap: 4px;
      align-items: center;
      padding: 4px 2px;
    }

    .typing-dots span {
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: var(--text-muted);
      animation: pulse 1.2s infinite ease-in-out;
    }

    .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
    .typing-dots span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes pulse {
      0%, 80%, 100% { opacity: 0.25; transform: scale(0.9); }
      40% { opacity: 1; transform: scale(1); }
    }

    /* Footer */
    #footer {
      padding: 14px 16px;
      border-top: 1px solid var(--border);
      flex-shrink: 0;
    }

    #input-row {
      display: flex;
      align-items: flex-end;
      gap: 10px;
      background: var(--bg);
      border: 1px solid var(--border-strong);
      border-radius: var(--radius);
      padding: 10px 10px 10px 16px;
      transition: border-color 0.15s;
    }

    #input-row:focus-within {
      border-color: var(--accent);
    }

    #input {
      flex: 1;
      border: none;
      background: transparent;
      font-family: var(--font);
      font-size: 14px;
      color: var(--text-primary);
      resize: none;
      outline: none;
      min-height: 22px;
      max-height: 120px;
      line-height: 1.5;
    }

    #input::placeholder { color: var(--text-muted); }

    #send {
      width: 34px;
      height: 34px;
      border-radius: 50%;
      border: none;
      background: var(--accent);
      color: #fff;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: opacity 0.15s, transform 0.1s;
    }

    #send:hover { opacity: 0.88; }
    #send:active { transform: scale(0.94); }
    #send:disabled { opacity: 0.35; cursor: not-allowed; }

    #send svg { width: 16px; height: 16px; }

    #hint {
      text-align: center;
      font-size: 11px;
      color: var(--text-muted);
      margin-top: 10px;
      font-family: var(--mono);
    }

    /* Error state */
    .bubble.error { color: #c0392b; border-color: #fde8e6; background: #fff5f5; }
  </style>
</head>
<body>

<div id="app">
  <div id="header">
    <div class="status-dot" id="dot"></div>
    <span id="header-title">Local AI</span>
    <div id="header-right">
      <span class="local-badge">100% local</span>
      <span class="model-badge">MiniCPM5-1B</span>
    </div>
  </div>

  <div id="messages">
    <div class="msg ai">
      <div class="avatar ai">AI</div>
      <div class="bubble">Hi! I'm MiniCPM5-1B running entirely on your machine via Ollama. No data leaves your computer. What would you like to explore?</div>
    </div>
  </div>

  <div id="footer">
    <div id="input-row">
      <textarea id="input" placeholder="Send a message..." rows="1"></textarea>
      <button id="send" aria-label="Send message">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="12" y1="19" x2="12" y2="5"/><polyline points="5 12 12 5 19 12"/>
        </svg>
      </button>
    </div>
    <p id="hint">Enter to send · Shift+Enter for new line · Ollama must be running</p>
  </div>
</div>

<script>
  const messagesEl = document.getElementById('messages');
  const inputEl = document.getElementById('input');
  const sendBtn = document.getElementById('send');
  const dot = document.getElementById('dot');

  const OLLAMA_URL = 'http://localhost:11434/api/chat';
  const MODEL = 'hf.co/openbmb/MiniCPM5-1B-GGUF';

  let history = [];
  let isGenerating = false;

  function addMsg(role, text, typing = false) {
    const wrap = document.createElement('div');
    wrap.className = 'msg ' + (role === 'user' ? 'user' : 'ai');

    const av = document.createElement('div');
    av.className = 'avatar ' + (role === 'user' ? 'user' : 'ai');
    av.textContent = role === 'user' ? 'A' : 'AI';

    const bubble = document.createElement('div');
    bubble.className = 'bubble';

    if (typing) {
      bubble.innerHTML = '<div class="typing-dots"><span></span><span></span><span></span></div>';
    } else {
      bubble.textContent = text;
    }

    wrap.appendChild(av);
    wrap.appendChild(bubble);
    messagesEl.appendChild(wrap);
    messagesEl.scrollTop = messagesEl.scrollHeight;
    return bubble;
  }

  async function send() {
    const text = inputEl.value.trim();
    if (!text || isGenerating) return;

    inputEl.value = '';
    inputEl.style.height = 'auto';
    isGenerating = true;
    sendBtn.disabled = true;

    addMsg('user', text);
    history.push({ role: 'user', content: text });

    const aiBubble = addMsg('ai', '', true);

    try {
      const res = await fetch(OLLAMA_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ model: MODEL, messages: history, stream: true })
      });

      if (!res.ok) throw new Error('HTTP ' + res.status);

      const reader = res.body.getReader();
      const decoder = new TextDecoder();
      let full = '';
      aiBubble.textContent = '';
      dot.classList.remove('offline');

      while (true) {
        const { done, value } = await reader.read();
        if (done) break;
        const chunk = decoder.decode(value);
        for (const line of chunk.split('\n')) {
          if (!line.trim()) continue;
          try {
            const json = JSON.parse(line);
            if (json.message?.content) {
              full += json.message.content;
              aiBubble.textContent = full;
              messagesEl.scrollTop = messagesEl.scrollHeight;
            }
          } catch (_) {}
        }
      }

      history.push({ role: 'assistant', content: full });

    } catch (e) {
      aiBubble.textContent = 'Could not reach Ollama. Make sure it is running:\n\nPowerShell: $env:OLLAMA_ORIGINS="*"; ollama serve';
      aiBubble.classList.add('error');
      dot.classList.add('offline');
    }

    isGenerating = false;
    sendBtn.disabled = false;
    inputEl.focus();
  }

  sendBtn.addEventListener('click', send);

  inputEl.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      send();
    }
  });

  inputEl.addEventListener('input', () => {
    inputEl.style.height = 'auto';
    inputEl.style.height = Math.min(inputEl.scrollHeight, 120) + 'px';
  });
</script>
</body>
</html>
